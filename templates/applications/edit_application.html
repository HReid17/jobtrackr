{% extends "base.html" %}

{% block title %}
Edit Application | JobTrackr
{% endblock %}

{% block content %}

<h1>Edit Application</h1>

<form method="POST">

    <input type="text" name="company" value="{{ application.company }}" required>

    <input type="text" name="role" value="{{ application.role }}" required>

    <select name="status">

        <option value="Applied" {% if application.status=="Applied" %}selected{% endif %}>
            Applied
        </option>

        <option value="Interview" {% if application.status=="Interview" %}selected{% endif %}>
            Interview
        </option>

        <option value="Offer" {% if application.status=="Offer" %}selected{% endif %}>
            Offer
        </option>

        <option value="Rejected" {% if application.status=="Rejected" %}selected{% endif %}>
            Rejected
        </option>

    </select>

    <input type="date" name="applied_date" value="{{ application.applied_date }}" required>

    <input type="text" name="location" value="{{ application.location or '' }}">

    <input type="text" name="source" value="{{ application.source or '' }}">

    <input type="date" name="interview_date" value="{{ application.interview_date or '' }}">

    <input type="text" name="interview_time" value="{{ application.interview_time or '' }}">

    <textarea name="notes" rows="5">{{ application.notes or '' }}</textarea>

    <button type="submit">
        Update Application
    </button>

</form>

{% endblock %}
